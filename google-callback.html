    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

    <div class="text-center p-8">
        <div class="loader mx-auto mb-4"></div>
        <h1 class="text-lg font-bold text-slate-800 mb-2">Signing you in...</h1>
        <p class="text-sm text-slate-500">Please wait while we complete your Google sign-in.</p>
    </div>

    <script>
        // Extract access token from URL hash
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const error = params.get('error');

        if (error) {
            document.querySelector('h1').textContent = 'Sign-in Failed';
            document.querySelector('p').textContent = error;
            document.querySelector('.loader').style.display = 'none';
        } else if (accessToken) {
            // Send token back to parent window
            if (window.opener) {
                window.opener.postMessage({ googleToken: accessToken }, window.location.origin);
                window.close();
            } else {
                // If no opener, redirect to login page with token
                window.location.href = '/log_in?google_token=' + accessToken;
            }
        } else {
            document.querySelector('h1').textContent = 'Invalid Response';
            document.querySelector('p').textContent = 'No access token received from Google.';
            document.querySelector('.loader').style.display = 'none';
        }
    </script>
</body>
