            background: white;
            border-radius: calc(2.5rem - 1px);
            height: 100%;

        }

    <script>
        // Redirect if already logged in
        window.onload = function () {
            if (localStorage.getItem('billgen_user')) {
                window.location.replace('/templates');
                return;
            }

            initializeGoogleSignup();
        };

        // ═══════════════════════════════════════════════════════════════
        // GOOGLE SIGN-IN CONFIGURATION
        // ═══════════════════════════════════════════════════════════════
        // To enable Google Sign-In, you need to:
        // 1. Go to https://console.cloud.google.com/
        // 2. Create a new project (or use existing)
        // 3. Go to "APIs & Services" > "Credentials"
        // 4. Click "Create Credentials" > "OAuth client ID"
        // 5. Application type: "Web application"
        // 6. Add Authorized JavaScript origins:
        //    - http://localhost:5173
        //    - http://localhost:5174
        //    - http://127.0.0.1:5173
        // 7. Copy the Client ID and paste it below
        // ═══════════════════════════════════════════════════════════════
        const GOOGLE_CLIENT_ID = window.BillGenGoogleAuth?.clientId || '';
        const API_BASE_KEY = 'bg_api_base';

        function normalizeApiBase(url) {
            if (!url) return '';
            return String(url).trim().replace(/\/+$/, '');
        }

        function defaultApiBase() { return ""; }

        function getApiBase() {
            const override = normalizeApiBase(localStorage.getItem(API_BASE_KEY) || '');
            return override || defaultApiBase();
        }

        const API_BASE = getApiBase();
        function apiUrl(path) {
            return `${API_BASE}${path}`;
        }

        function showGoogleSignupError(message) {
            const errEl = document.getElementById('regError');
            errEl.textContent = message;
            errEl.classList.remove('hidden');
        }

        function setGoogleSignupBusy(isBusy) {
            const container = document.getElementById('googleSignupBtn');
            if (!container) return;
            container.style.pointerEvents = isBusy ? 'none' : 'auto';
            container.style.opacity = isBusy ? '0.7' : '1';
            container.setAttribute('aria-busy', isBusy ? 'true' : 'false');
        }

        function handleGoogleCredential(response) {
            try {
                const payload = window.BillGenGoogleAuth.decodeCredentialPayload(response.credential);
                sendGoogleAuthToServer({
                    email: payload.email,
                    first_name: payload.given_name || payload.name?.split(' ')[0] || 'User',
                    last_name: payload.family_name || payload.name?.split(' ').slice(1).join(' ') || '',
                    picture: payload.picture || '',
                    google_id: payload.sub || ''
                });
            } catch (err) {
                console.error('Google credential decode error:', err);
                showGoogleSignupError('Google sign-up could not be completed. Please try again.');
            }
        }

        function initializeGoogleSignup() {
            const container = document.getElementById('googleSignupBtn');
            if (!container) return;

            if (!window.BillGenGoogleAuth?.isConfigured()) {
                showGoogleSignupError('Google client ID is missing.');
                return;
            }

            if (typeof google === 'undefined' || !google.accounts?.id) {
                showGoogleSignupError('Google Sign-In is unavailable right now. Refresh and try again.');
                return;
            }

            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleGoogleCredential,
                auto_select: false,
                cancel_on_tap_outside: true,
                context: 'signup'
            });

            container.innerHTML = '';
            google.accounts.id.renderButton(container, {
                type: 'standard',
                theme: 'outline',
                size: 'large',
                text: 'signup_with',
                shape: 'rectangular',
                logo_alignment: 'left',
                width: String(Math.min(Math.max(Math.round(container.getBoundingClientRect().width || 320), 220), 400))
            });
        }

        // Handle Google Sign Up button click
        function handleGoogleSignup() {
            // Check if Google Client ID is configured
            if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
                alert('⚠️ Google Sign-In Setup Required!\n\n' +
                    '1. Go to console.cloud.google.com\n' +
                    '2. Create OAuth 2.0 Client ID\n' +
                    '3. Add localhost origins\n' +
                    '4. Copy Client ID to sign_in page\n\n' +
                    'See comments in this page for details.');
                return;
            }

            // Build Google OAuth URL
            const redirectUri = window.location.origin + '/google-callback';
            const scope = 'openid email profile';
            const googleAuthUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
                'client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID) +
                '&redirect_uri=' + encodeURIComponent(redirectUri) +
                '&response_type=token' +
                '&scope=' + encodeURIComponent(scope) +
                '&prompt=select_account';

            // Open Google Sign-In popup
            const width = 500;
            const height = 600;
            const left = (window.innerWidth - width) / 2 + window.screenX;
            const top = (window.innerHeight - height) / 2 + window.screenY;

            const popup = window.open(
                googleAuthUrl,
                'Google Sign In',
                `width=${width},height=${height},left=${left},top=${top},toolbar=no,menubar=no`
            );

            if (!popup) {
                alert('Popup blocked. Please allow popups for Google sign-in.');
                return;
            }

            // Listen for message from popup
            window.addEventListener('message', async function handler(event) {
                if (event.origin !== window.location.origin) return;
                if (!event.data.googleToken) return;

                window.removeEventListener('message', handler);

                // Get user info from Google
                try {
                    const userInfoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                        headers: { Authorization: 'Bearer ' + event.data.googleToken }
                    });
                    const userInfo = await userInfoRes.json();

                    // Send to our server
                    await sendGoogleAuthToServer(userInfo);
                } catch (err) {
                    console.error('Error getting Google user info:', err);
                    alert('Failed to get Google account info. Please try again.');
                }
            });
        }

        // Send Google auth data to server
        async function sendGoogleAuthToServer(googleUser) {
            const errEl = document.getElementById('regError');

            errEl.classList.add('hidden');
            setGoogleSignupBusy(true);

            try {
                const res = await fetch(apiUrl('/api/auth/google'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: googleUser.email,
                        first_name: googleUser.given_name || googleUser.name?.split(' ')[0] || 'User',
                        last_name: googleUser.family_name || googleUser.name?.split(' ').slice(1).join(' ') || '',
                        picture: googleUser.picture || '',
                        google_id: googleUser.sub || ''
                    })
                });

                const result = await res.json();

                if (res.ok && result.user) {
                    // Store user session
                    localStorage.setItem('billgen_user', JSON.stringify(result.user));

                    // Force redirect with fallback
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 100);
                    window.location.replace('/');
                    return;
                } else {
                    errEl.textContent = result.error || 'Google sign-up failed';
                    errEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Google signup error:', err);
                errEl.textContent = 'Server not reachable. Run: npm run server';
                errEl.classList.remove('hidden');
            }

            setGoogleSignupBusy(false);
        }

        async function registerUser(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const errEl = document.getElementById('regError');
            const pass = document.getElementById('regPassword').value;
            const conf = document.getElementById('confirmPassword').value;

            if (pass !== conf) {
                errEl.textContent = 'Passwords do not match!';
                errEl.classList.remove('hidden');
                return;
            }

            errEl.classList.add('hidden');
            btn.textContent = 'Creating...';
            btn.disabled = true;

            const data = {
                first_name: document.getElementById('regFirstName').value.trim(),
                last_name: document.getElementById('regLastName').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                password: pass,
            };

            try {
                const res = await fetch(apiUrl('/api/auth/register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const result = await res.json();

                if (res.ok && result.user) {
                    errEl.textContent = '';
                    errEl.classList.add('hidden');
                    // Store user in session and go to home
                    localStorage.setItem('billgen_user', JSON.stringify(result.user));
                    // Force redirect with fallback
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 100);
                    window.location.replace('/');
                    return;
                } else {
                    errEl.textContent = result.error || 'Registration failed';
                    errEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Registration error:', err);
                errEl.textContent = 'Server not reachable. Run: npm run server';
                errEl.classList.remove('hidden');
            }

            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    </script>
